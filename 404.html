<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — WebMint</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<script>(function(){var t=localStorage.getItem("webmint-theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");})();</script>
</head>
<body>
<div id="site-header"></div>
<main>
  <div class="wrap error-page">
    <div class="error-page__code">404</div>
    <h1 class="mt-2">This page took a wrong turn.</h1>
    <p class="hero__subhead" style="margin-inline:auto">The page you're looking for doesn't exist, or may have moved.</p>
    <div class="hero__ctas" style="justify-content:center; margin-top:1.5rem">
      <a href="index.html" class="btn btn--primary btn--lg">Back to homepage</a>
      <a href="contact.html" class="btn btn--ghost btn--lg">Contact us</a>
    </div>
  </div>
</main>
<div id="site-footer"></div>
<script src="js/config.js"></script>
<script src="js/navigation.js"></script>
<script src="js/main.js"></script>
</body>
</html>
